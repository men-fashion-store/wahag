<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وَهَج - للشموع الفاخرة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{brand:'#8B7355',brandDark:'#6A563D',bgLight:'#FAF8F5'},fontFamily:{sans:['Cairo','sans-serif']}}}}</script>
  <style>
    body { background-color: #FAF8F5; -webkit-tap-highlight-color: transparent; }
    #cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .cart-open { transform: translateX(0) !important; }
    .cart-closed { transform: translateX(-100%) !important; }
    @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    .toast-animate { animation: slideDown 0.3s ease-out forwards; }
  </style>
 </head>
 <body class="min-h-screen text-gray-800 flex flex-col relative overflow-x-hidden">
   
   <div id="toast-container" class="fixed top-5 left-1/2 z-[9999] pointer-events-none flex flex-col gap-2"></div>

   <header class="bg-white/95 backdrop-blur-md p-3 sticky top-0 z-40 border-b border-gray-100 flex justify-between items-center shadow-sm">
       <div class="flex items-center gap-3 cursor-pointer" onclick="window.scrollTo(0,0)">
           <img src="./wahaj.png" alt="شعار وَهَج" class="w-12 h-12 rounded-full object-cover shadow-md border-2 border-brand/20">
           <h1 class="text-3xl font-black text-brand tracking-[0.1em]">وَهَج</h1>
       </div>
       <div class="flex items-center gap-4">
           <button onclick="window.openAuth()" class="flex flex-col items-center text-gray-500 hover:text-brand transition">
               <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
               <span id="header-user-name" class="text-[10px] font-bold">دخول</span>
           </button>
           
           <button onclick="toggleCart()" class="relative p-2 text-brand hover:text-brandDark transition transform hover:scale-110">
               <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
               <span id="cart-badge" class="absolute top-0 right-0 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] font-bold flex items-center justify-center shadow-md scale-0 transition-transform duration-300">0</span>
           </button>
       </div>
   </header>

   <div class="w-full h-[40vh] relative mb-12 overflow-hidden flex-shrink-0">
       <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
       <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-black/20 flex flex-col items-center justify-center text-white px-4">
           <h2 class="text-4xl md:text-5xl font-black tracking-widest text-center mb-4">نورٌ يعانق الهدوء</h2>
           <p class="text-lg md:text-xl font-semibold opacity-90 text-center">شموع يدوية الصنع تملأ مساحتك بالفخامة والسكينة</p>
       </div>
   </div>

   <main class="flex-1 max-w-5xl mx-auto px-4 w-full mb-20">
       <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-2">
           <h2 class="text-2xl font-bold tracking-widest text-gray-800">مجموعتنا العطرية</h2>
       </div>
       <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
   </main>

   <div id="auth-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center backdrop-blur-sm p-4 flex opacity-0 transition-opacity">
       <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden">
           <div class="flex bg-gray-50 border-b">
               <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-4 font-black text-brand border-b-2 border-brand">تسجيل دخول</button>
               <button onclick="switchAuthTab('signup')" id="tab-signup" class="flex-1 py-4 font-bold text-gray-400 border-b-2 border-transparent">حساب جديد</button>
           </div>
           
           <div class="p-6 relative">
               <button onclick="window.closeAuth()" class="absolute top-2 left-4 text-gray-400 hover:text-red-500 font-bold text-xl">✕</button>
               
               <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
                   <input type="tel" id="login-phone" class="w-full p-4 rounded-xl border border-gray-200 focus:border-brand outline-none bg-bgLight text-center tracking-widest font-bold" placeholder="رقم الموبايل" required>
                   <input type="password" id="login-pass" class="w-full p-4 rounded-xl border border-gray-200 focus:border-brand outline-none bg-bgLight text-center tracking-widest font-bold" placeholder="كلمة المرور" required>
                   <button type="submit" id="btn-login" class="w-full py-4 bg-brand text-white font-bold rounded-xl text-lg hover:bg-brandDark transition">دخول</button>
               </form>

               <form id="form-signup" onsubmit="handleSignup(event)" class="space-y-4 hidden">
                   <input type="text" id="signup-name" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand outline-none text-sm font-bold" placeholder="الاسم الكريم" required>
                   <input type="tel" id="signup-phone" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand outline-none text-sm font-bold" placeholder="رقم الموبايل" required>
                   <input type="password" id="signup-pass" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand outline-none text-sm font-bold" placeholder="كلمة مرور جديدة (6 أرقام على الأقل)" required minlength="6">
                   <textarea id="signup-address" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand outline-none text-sm h-20 resize-none font-bold" placeholder="العنوان بالتفصيل" required></textarea>
                   <button type="submit" id="btn-signup" class="w-full py-4 bg-brand text-white font-bold rounded-xl text-lg hover:bg-brandDark transition">إنشاء الحساب</button>
               </form>

               <div id="user-profile" class="hidden text-center space-y-4">
                   <div class="w-20 h-20 bg-brand/10 rounded-full flex items-center justify-center mx-auto text-3xl">👤</div>
                   <h3 id="profile-name" class="font-black text-xl text-gray-800"></h3>
                   <p id="profile-phone" class="text-sm text-gray-500 font-bold"></p>
                   <button onclick="handleLogout()" class="w-full py-3 border border-red-500 text-red-500 font-bold rounded-xl hover:bg-red-50 transition">تسجيل خروج</button>
               </div>
           </div>
       </div>
   </div>

   <div id="cart-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden backdrop-blur-sm transition-opacity" onclick="toggleCart()"></div>
   <div id="cart-drawer" class="fixed top-0 left-0 h-full w-full sm:w-[400px] bg-white z-[70] shadow-2xl flex flex-col cart-closed">
        <div class="p-4 border-b flex justify-between items-center bg-bgLight">
            <div class="flex items-center gap-3"><img src="./wahaj.png" class="w-10 h-10 rounded-full object-cover shadow border border-brand/20"><h2 class="font-black text-xl text-brand">سلة التسوق</h2></div>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500 bg-white rounded-full p-1 shadow-sm transition">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4 bg-white"></div>
        <div class="p-5 border-t bg-bgLight shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center font-black text-xl mb-4 text-gray-800"><span>الإجمالي:</span><span id="cart-total" class="text-brand text-2xl">0 ج.م</span></div>
            <button id="checkout-btn" onclick="handleCheckout()" class="w-full py-4 bg-brand text-white font-bold text-lg rounded-xl tracking-widest hover:bg-brandDark transform active:scale-95 transition-all">تأكيد الطلب ✅</button>
        </div>
   </div>

   <script type="module" src="app.js"></script>
 </body>
</html>
