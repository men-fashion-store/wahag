<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وَهَج - للشموع الفاخرة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { 
        theme: { 
            extend: { 
                colors: { brand: '#8B7355', brandDark: '#6A563D', bgLight: '#FAF8F5' }, 
                fontFamily: { sans: ['Cairo', 'sans-serif'] }
            } 
        } 
    }
  </script>
  <style>
    body { background-color: #FAF8F5; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
    /* السلة الجانبية الناعمة */
    #cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .cart-open { transform: translateX(0) !important; }
    .cart-closed { transform: translateX(-100%) !important; } /* في الـ RTL بنسحبها للشمال */
    /* الانيميشن بتاع الاشعارات */
    @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    .toast-animate { animation: slideDown 0.3s ease-out forwards; }
    .loader { border: 3px solid #f3f3f3; border-top: 3px solid #8B7355; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
 </head>
 <body class="min-h-screen text-gray-800 flex flex-col relative overflow-x-hidden">
   
   <div id="toast-container" class="fixed top-5 left-1/2 z-[9999] pointer-events-none flex flex-col gap-2"></div>

   <header class="bg-white/90 backdrop-blur-md p-4 sticky top-0 z-40 border-b border-gray-100 flex justify-between items-center shadow-sm">
       <div class="w-10"></div> <h1 class="text-3xl font-black text-brand tracking-[0.2em] cursor-pointer" onclick="window.scrollTo(0,0)">وَهَج</h1>
       <button onclick="toggleCart()" class="relative p-2 text-brand hover:text-brandDark transition transform hover:scale-110">
           <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
           <span id="cart-badge" class="absolute top-0 right-0 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] font-bold flex items-center justify-center shadow-md scale-0 transition-transform duration-300">0</span>
       </button>
   </header>

   <div class="w-full h-[40vh] relative mb-12 overflow-hidden flex-shrink-0">
       <img src="https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
       <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-black/20 flex flex-col items-center justify-center text-white px-4">
           <h2 class="text-4xl md:text-5xl font-black tracking-widest text-center mb-4">نورٌ يعانق الهدوء</h2>
           <p class="text-lg md:text-xl font-semibold opacity-90 text-center">شموع يدوية الصنع تملأ مساحتك بالفخامة والسكينة</p>
       </div>
   </div>

   <main class="flex-1 max-w-5xl mx-auto px-4 w-full mb-20">
       <div class="flex justify-between items-end mb-8 border-b border-gray-200 pb-2">
           <h2 class="text-2xl font-bold tracking-widest text-gray-800">مجموعتنا العطرية</h2>
       </div>
       <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
           <div class="col-span-full text-center py-20"><span class="loader w-10 h-10 border-4 border-t-brand"></span><p class="mt-4 text-brand font-bold">جاري إشعال الشموع...</p></div>
       </div>
   </main>

   <div id="cart-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden backdrop-blur-sm transition-opacity" onclick="toggleCart()"></div>
   
   <div id="cart-drawer" class="fixed top-0 left-0 h-full w-full sm:w-[400px] bg-white z-[70] shadow-2xl flex flex-col cart-closed">
        <div class="p-5 border-b flex justify-between items-center bg-bgLight">
            <h2 class="font-black text-xl text-brand tracking-widest flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg> سلة التسوق
            </h2>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-red-500 bg-white rounded-full p-1 shadow-sm transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4 bg-white"></div>

        <div class="p-5 border-t bg-bgLight shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="flex justify-between items-center font-black text-xl mb-4 text-gray-800">
                <span>الإجمالي:</span>
                <span id="cart-total" class="text-brand text-2xl">0 ج.م</span>
            </div>
            
            <div id="checkout-form" class="space-y-3 mb-4 hidden">
                <p class="text-xs font-bold text-gray-500 mb-1">بيانات التوصيل:</p>
                <input id="cart-name" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand focus:ring-1 focus:ring-brand outline-none transition text-sm" placeholder="الاسم الكريم" required>
                <input id="cart-phone" type="tel" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand focus:ring-1 focus:ring-brand outline-none transition text-sm" placeholder="رقم الموبايل للتواصل" required>
                <textarea id="cart-address" class="w-full p-3 rounded-xl border border-gray-200 focus:border-brand focus:ring-1 focus:ring-brand outline-none transition text-sm h-20 resize-none" placeholder="العنوان بالتفصيل (المدينة، الحي، الشارع)" required></textarea>
            </div>

            <button id="checkout-btn" onclick="handleCheckoutStep()" class="w-full py-4 bg-brand text-white font-bold text-lg rounded-xl tracking-widest hover:bg-brandDark hover:shadow-lg transform active:scale-95 transition-all flex justify-center items-center gap-2">
                متابعة الطلب ➔
            </button>
        </div>
   </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyASO-AN5XaSGn4SaCZ8VlHr6zsFCIxPCzs", authDomain: "ahmed-shoes.firebaseapp.com", projectId: "ahmed-shoes", storageBucket: "ahmed-shoes.firebasestorage.app", messagingSenderId: "172928088473", appId: "1:172928088473:web:100f543fd097a8d5c33b08" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.cart = JSON.parse(localStorage.getItem('wahaj_cart')) || [];
    window.products = [];
    window.checkoutStep = 1;

    // جلب المنتجات
    async function fetchProducts() {
        try {
            const q = query(collection(db, "products"), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            window.products = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderProducts();
        } catch(e) { window.toast('حدث خطأ في جلب المنتجات', 'error'); }
    }

    // عرض المنتجات بشكل احترافي
    function renderProducts() {
        const grid = document.getElementById('products-grid');
        if(!window.products.length) { grid.innerHTML = '<div class="col-span-full text-center text-gray-400 py-10 font-bold">لا توجد منتجات حالياً</div>'; return; }
        
        grid.innerHTML = window.products.map(p => {
            const hasSale = p.oldPrice && Number(p.oldPrice) > Number(p.price);
            return `
            <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-xl transition-shadow duration-300 group flex flex-col">
                <div class="relative h-64 bg-gray-50 overflow-hidden">
                    ${hasSale ? `<span class="absolute top-3 right-3 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10">خصم</span>` : ''}
                    <img src="${p.images[0]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    
                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                        <button onclick="addToCart('${p.id}')" class="bg-white text-brand px-6 py-2 rounded-full font-bold shadow-lg transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300 hover:bg-brand hover:text-white">أضف للسلة 🛒</button>
                    </div>
                </div>
                <div class="p-5 flex-1 flex flex-col">
                    <h3 class="font-bold text-xl text-gray-800 mb-1">${p.name}</h3>
                    ${p.desc ? `<p class="text-xs text-gray-500 mb-3 line-clamp-2">${p.desc}</p>` : ''}
                    <div class="mt-auto flex justify-between items-center">
                        <div class="flex flex-col">
                            ${hasSale ? `<span class="text-xs text-gray-400 line-through">${p.oldPrice} ج.م</span>` : ''}
                            <span class="font-black text-2xl text-brand">${p.price} <span class="text-sm">ج.م</span></span>
                        </div>
                        <button onclick="addToCart('${p.id}')" class="w-10 h-10 bg-bgLight rounded-full flex items-center justify-center text-brand hover:bg-brand hover:text-white transition md:hidden shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        </button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    // إدارة السلة الديناميكية
    window.addToCart = (id) => {
        const prod = window.products.find(x => x.id === id);
        const exists = window.cart.find(i => i.id === id);
        
        if(exists) exists.qty++;
        else window.cart.push({ id: prod.id, name: prod.name, price: Number(prod.price), image: prod.images[0], qty: 1 });
        
        saveCart(); updateBadge(); renderCartDrawer(); 
        window.toast(`تم إضافة "${prod.name}" للسلة ✨`);
        
        // فتح السلة تلقائياً لثانية كنوع من التأكيد البصري
        if(document.getElementById('cart-drawer').classList.contains('cart-closed')){
            toggleCart();
        }
    };

    window.renderCartDrawer = () => {
        const container = document.getElementById('cart-items');
        let total = 0;
        
        if(window.cart.length === 0) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-60 mt-20">
                    <svg class="w-24 h-24 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <p class="font-bold text-lg">سلتك فارغة</p>
                    <p class="text-sm">لم تقم بإضافة أي شموع بعد.</p>
                </div>`;
            document.getElementById('cart-total').innerText = '0 ج.م';
            resetCheckout();
            return;
        }

        container.innerHTML = window.cart.map((item, idx) => {
            total += item.price * item.qty;
            return `
            <div class="flex gap-4 bg-white p-3 rounded-xl border border-gray-100 shadow-sm relative">
                <img src="${item.image}" class="w-20 h-20 rounded-lg object-cover bg-gray-50 border">
                <div class="flex-1 flex flex-col justify-between">
                    <h4 class="font-bold text-sm text-gray-800 pr-5">${item.name}</h4>
                    <p class="font-black text-brand">${item.price * item.qty} ج.م</p>
                    
                    <div class="flex items-center gap-3 bg-gray-50 w-fit rounded-lg border border-gray-200 p-1">
                        <button onclick="updateQty(${idx}, -1)" class="w-6 h-6 flex items-center justify-center text-brand font-bold hover:bg-gray-200 rounded">-</button>
                        <span class="text-sm font-bold w-4 text-center">${item.qty}</span>
                        <button onclick="updateQty(${idx}, 1)" class="w-6 h-6 flex items-center justify-center text-brand font-bold hover:bg-gray-200 rounded">+</button>
                    </div>
                </div>
                <button onclick="removeItem(${idx})" class="absolute top-2 left-2 text-gray-300 hover:text-red-500 transition p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>`;
        }).join('');
        
        document.getElementById('cart-total').innerText = total + ' ج.م';
    };

    window.updateQty = (idx, val) => { window.cart[idx].qty += val; if(window.cart[idx].qty <= 0) window.cart.splice(idx,1); saveCart(); updateBadge(); renderCartDrawer(); };
    window.removeItem = (idx) => { window.cart.splice(idx,1); saveCart(); updateBadge(); renderCartDrawer(); };
    window.saveCart = () => localStorage.setItem('wahaj_cart', JSON.stringify(window.cart));
    
    window.updateBadge = () => { 
        const count = window.cart.reduce((s, i) => s + i.qty, 0); 
        const badge = document.getElementById('cart-badge');
        badge.innerText = count; 
        if(count > 0) { badge.classList.remove('scale-0'); badge.classList.add('scale-100'); } 
        else { badge.classList.remove('scale-100'); badge.classList.add('scale-0'); }
    };

    // التحكم في فتح وغلق السلة بنعومة
    window.toggleCart = () => {
        const drawer = document.getElementById('cart-drawer');
        const overlay = document.getElementById('cart-overlay');
        
        if(drawer.classList.contains('cart-closed')) {
            renderCartDrawer();
            drawer.classList.remove('cart-closed');
            drawer.classList.add('cart-open');
            overlay.classList.remove('hidden');
            setTimeout(()=> overlay.classList.add('opacity-100'), 10);
            document.body.style.overflow = 'hidden'; // منع السكرول للصفحة اللي ورا
        } else {
            drawer.classList.remove('cart-open');
            drawer.classList.add('cart-closed');
            overlay.classList.remove('opacity-100');
            setTimeout(()=> overlay.classList.add('hidden'), 300);
            document.body.style.overflow = '';
            resetCheckout();
        }
    };

    // نظام الدفع المتدرج (خطوتين داخل السلة)
    function resetCheckout() {
        window.checkoutStep = 1;
        document.getElementById('checkout-form').classList.add('hidden');
        document.getElementById('cart-items').style.display = 'block';
        document.getElementById('checkout-btn').innerHTML = 'متابعة الطلب ➔';
    }

    window.handleCheckoutStep = async () => {
        if(!window.cart.length) return window.toast('السلة فارغة!', 'error');

        if(window.checkoutStep === 1) {
            // الانتقال لخطوة البيانات
            window.checkoutStep = 2;
            document.getElementById('cart-items').style.display = 'none'; // إخفاء المنتجات لعرض الفورم
            document.getElementById('checkout-form').classList.remove('hidden');
            document.getElementById('checkout-btn').innerHTML = 'تأكيد وإرسال الطلب ✅';
        } else {
            // تنفيذ الطلب
            const name = document.getElementById('cart-name').value.trim();
            const phone = document.getElementById('cart-phone').value.trim();
            const address = document.getElementById('cart-address').value.trim();
            const btn = document.getElementById('checkout-btn');

            if(!name || !phone || !address) return window.toast('يرجى ملء جميع بيانات التوصيل', 'error');

            btn.disabled = true;
            btn.innerHTML = '<span class="loader border-t-white w-5 h-5"></span> جاري الإرسال...';

            const totalAmount = window.cart.reduce((s,i) => s + (i.price * i.qty), 0);
            
            try {
                // 1. حفظ في قاعدة البيانات (للأدمن)
                await addDoc(collection(db, "orders"), {
                    items: window.cart,
                    total: totalAmount,
                    customerName: name,
                    customerPhone: phone,
                    customerAddress: address,
                    timestamp: Date.now(),
                    status: 'new',
                    read: false // عشان الأدمن يعرف انه جديد
                });

                // 2. تجهيز رسالة الواتساب المنسقة
                let msg = `✨ *طلب جديد من متجر وَهَج* ✨\n\n`;
                msg += `👤 *الاسم:* ${name}\n`;
                msg += `📞 *الموبايل:* ${phone}\n`;
                msg += `📍 *العنوان:* ${address}\n\n`;
                msg += `🛍️ *التفاصيل:*\n`;
                window.cart.forEach(item => { msg += `🔸 ${item.name} (الكمية: ${item.qty}) - ${item.price * item.qty} ج.م\n`; });
                msg += `\n💰 *الإجمالي المطلوب:* ${totalAmount} ج.م`;

                // 3. مسح السلة والرجوع
                window.cart = []; saveCart(); updateBadge(); toggleCart();
                window.toast('تم تأكيد طلبك بنجاح! سيتم تحويلك للواتساب...', 'success');

                // 4. فتح الواتساب
                setTimeout(() => {
                    window.open(`https://wa.me/201020468021?text=${encodeURIComponent(msg)}`, '_blank');
                    btn.disabled = false;
                }, 1500);

            } catch(e) { 
                window.toast('حدث خطأ في الشبكة، حاول مرة أخرى', 'error'); 
                btn.disabled = false; 
                btn.innerHTML = 'تأكيد وإرسال الطلب ✅';
            }
        }
    };

    // نظام الإشعارات (Toast)
    window.toast = (msg, type = 'success') => {
        const container = document.getElementById('toast-container');
        const el = document.createElement('div');
        const bgColor = type === 'error' ? 'bg-red-500' : 'bg-brandDark';
        el.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-2xl font-bold flex items-center gap-2 toast-animate border border-white/20`;
        el.innerHTML = type === 'error' ? `<span>⚠️</span> ${msg}` : `<span>✨</span> ${msg}`;
        container.appendChild(el);
        setTimeout(() => {
            el.style.opacity = '0';
            el.style.transform = 'translate(-50%, -100%)';
            el.style.transition = 'all 0.3s ease-in';
            setTimeout(()=> el.remove(), 300);
        }, 3000);
    };

    // التهيئة المبدئية
    fetchProducts();
    updateBadge();
   </script>
 </body>
</html>
