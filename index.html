<!doctype html>
<html lang="ar" dir="rtl" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>وَهَج - شموع يدوية فاخرة</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script>tailwind.config={theme:{extend:{colors:{brand:'#8B7355',brandDark:'#6A563D',bgLight:'#FAF8F5', accent: '#D4AF37', softPink: '#F4C2C2'},fontFamily:{sans:['Cairo','sans-serif']}}}}</script>
  <style>
    body { background-color: #FAF8F5; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
    #cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .cart-open { transform: translateX(0) !important; }
    .cart-closed { transform: translateX(-100%) !important; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    @keyframes slideDown { from { transform: translate(-50%, -100%); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    .toast-animate { animation: slideDown 0.3s ease-out forwards; }
    /* تأثير النار للزرار */
    .fire-glow { filter: drop-shadow(0 0 4px #ff4500); }
  </style>
 </head>
 <body class="min-h-screen text-gray-800 flex flex-col relative overflow-x-hidden">
   
   <div id="toast-container" class="fixed top-5 left-1/2 -translate-x-1/2 z-[9999] pointer-events-none flex flex-col gap-2 w-max"></div>

   <header class="bg-white/90 backdrop-blur-md p-3 sticky top-0 z-40 border-b border-gray-100 flex justify-between items-center shadow-sm">
       <div class="flex items-center gap-3 cursor-pointer" onclick="switchNav('home')">
           <img src="./وهج.png" alt="شعار وَهَج" class="w-12 h-12 rounded-full object-cover shadow-md border border-brand/20">
           <h1 class="text-3xl font-black text-brand tracking-[0.1em]">وَهَج</h1>
       </div>
       <div class="flex items-center gap-4">
           <button onclick="switchNav('profile')" class="flex flex-col items-center text-gray-500 hover:text-brand transition">
               <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
               <span id="header-user-name" class="text-[10px] font-bold">دخول</span>
           </button>
           
           <button onclick="toggleCart()" class="relative p-2 text-brand hover:text-brandDark transition transform hover:scale-110">
               <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
               <span id="cart-badge" class="absolute top-0 right-0 w-5 h-5 bg-red-500 text-white rounded-full text-[10px] font-bold flex items-center justify-center shadow-md hidden">0</span>
           </button>
       </div>
   </header>

   <main id="view-home" class="flex-1 max-w-lg mx-auto w-full">
       <div class="w-full h-[35vh] relative mb-6 overflow-hidden flex-shrink-0">
           <img id="main-hero-img" src="https://images.unsplash.com/photo-1603006905003-be475563bc59?auto=format&fit=crop&q=80" class="w-full h-full object-cover">
           <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-black/20 flex flex-col items-center justify-center text-white px-4">
               <h2 class="text-4xl font-black tracking-widest text-center mb-2">نورٌ يعانق الهدوء</h2>
               <p class="text-sm font-semibold opacity-90 text-center">شموع يدوية الصنع تملأ مساحتك بالفخامة والسكينة</p>
           </div>
       </div>

       <div class="px-4 mb-6"><div id="home-slider" class="flex overflow-x-auto snap-x hide-scroll h-48 rounded-2xl shadow-sm gap-2 hidden"></div></div>

       <div class="px-4 mb-6">
           <div class="flex justify-between items-center gap-3 overflow-x-auto hide-scroll pb-2 pt-2">
               
               <button onclick="filterProducts('all')" id="filter-all" class="filter-btn flex-1 min-w-[80px] py-2.5 rounded-2xl border border-brand bg-brand text-white shadow-md font-bold text-sm transition-all duration-300">الكل</button>
               
               <button onclick="filterProducts('best')" id="filter-best" class="filter-btn flex-1 min-w-[120px] py-2.5 rounded-2xl border border-gray-200 bg-white text-gray-500 font-bold text-sm transition-all duration-300 flex items-center justify-center gap-1 relative overflow-hidden group">
                   الأكثر مبيعاً 
                   <span class="animate-pulse text-lg fire-glow group-hover:scale-125 transition-transform">🔥</span>
               </button>
               
               <button onclick="filterProducts('offers')" id="filter-offers" class="filter-btn flex-1 min-w-[100px] py-2.5 rounded-2xl border border-gray-200 bg-white text-gray-500 font-bold text-sm transition-all duration-300 relative">
                   العروض 
                   <span class="absolute -top-2 -left-2 bg-red-500 text-white text-[9px] px-2 py-0.5 rounded-br-xl rounded-tl-xl shadow-sm animate-bounce tracking-widest font-black" style="transform: rotate(-10deg);">SALE</span>
               </button>
               
           </div>
       </div>

       <div id="main-products-grid" class="grid grid-cols-2 gap-4 px-4 pb-8">
           </div>
   </main>

   <main id="view-product-details" class="flex-1 max-w-lg mx-auto w-full hidden">
       <button onclick="switchNav('home')" class="m-4 w-10 h-10 bg-white/80 backdrop-blur rounded-full shadow-md flex items-center justify-center font-bold text-brand text-xl absolute z-10">➔</button>
       
       <img id="pd-main-image" class="w-full h-[45vh] object-cover rounded-b-3xl shadow-sm transition-all duration-300">
       <div id="pd-thumbnails" class="flex gap-2 px-4 mt-3 overflow-x-auto hide-scroll snap-x justify-center"></div>

       <div class="p-6 bg-white mt-4 rounded-t-3xl relative z-20 shadow-[0_-5px_15px_rgba(0,0,0,0.02)] border-t border-gray-100">
           <h2 id="pd-name" class="text-2xl font-black text-gray-800 mb-2"></h2>
           <p id="pd-price" class="text-xl font-black text-brand mb-4"></p>
           <div class="bg-bgLight p-4 rounded-xl mb-6">
               <h3 class="font-bold text-sm mb-2 text-gray-600">الوصف</h3>
               <p id="pd-desc" class="text-sm leading-relaxed text-gray-500 whitespace-pre-wrap"></p>
           </div>
           
           <div class="flex gap-3">
               <button onclick="addToCart(window.currentProduct.id)" class="flex-1 py-4 bg-brand text-white font-bold rounded-xl shadow-lg hover:bg-brandDark transform active:scale-95 transition">إضافة للسلة 🛒</button>
               <button onclick="toggleWishlist(window.currentProduct.id)" class="w-14 h-14 bg-softPink/20 text-red-500 rounded-xl flex items-center justify-center text-2xl shadow-sm transform active:scale-95 transition">❤️</button>
           </div>
       </div>
   </main>

   <main id="view-wishlist" class="flex-1 max-w-lg mx-auto w-full hidden p-4">
       <h2 class="text-2xl font-black text-brand mb-6 border-b pb-2">❤️ مفضلاتي</h2>
       <div id="wishlist-grid" class="grid grid-cols-2 gap-4"></div>
   </main>

   <main id="view-orders" class="flex-1 max-w-lg mx-auto w-full hidden p-4">
       <h2 class="text-2xl font-black text-brand mb-6 border-b pb-2">📦 طلباتي</h2>
       <div id="user-orders-list"></div>
   </main>

   <main id="view-profile" class="flex-1 max-w-lg mx-auto w-full hidden p-4">
       <div id="auth-section" class="bg-white p-6 rounded-2xl shadow-sm">
           <div class="flex border-b mb-6">
               <button onclick="switchAuthTab('login')" id="tab-login" class="flex-1 py-3 font-black text-brand border-b-2 border-brand">دخول</button>
               <button onclick="switchAuthTab('signup')" id="tab-signup" class="flex-1 py-3 font-bold text-gray-400 border-b-2 border-transparent">تسجيل جديد</button>
           </div>
           
           <form id="form-login" onsubmit="handleLogin(event)" class="space-y-4">
               <input type="tel" id="login-phone" class="w-full p-4 rounded-xl bg-bgLight outline-none text-center font-bold" placeholder="رقم الموبايل" required>
               <input type="password" id="login-pass" class="w-full p-4 rounded-xl bg-bgLight outline-none text-center font-bold" placeholder="كلمة المرور" required>
               <button type="submit" id="btn-login" class="w-full py-4 bg-brand text-white font-bold rounded-xl">دخول</button>
           </form>

           <form id="form-signup" onsubmit="handleSignup(event)" class="space-y-4 hidden">
               <input type="text" id="signup-name" class="w-full p-3 rounded-xl bg-bgLight outline-none font-bold text-sm" placeholder="الاسم" required>
               <input type="tel" id="signup-phone" class="w-full p-3 rounded-xl bg-bgLight outline-none font-bold text-sm" placeholder="الموبايل" required>
               <select id="signup-gov" class="w-full p-3 rounded-xl bg-bgLight outline-none font-bold text-sm text-gray-500"><option value="القاهرة">القاهرة</option><option value="الجيزة">الجيزة</option><option value="الإسكندرية">الإسكندرية</option><option value="أخرى">محافظة أخرى</option></select>
               <input type="password" id="signup-pass" class="w-full p-3 rounded-xl bg-bgLight outline-none font-bold text-sm" placeholder="كلمة مرور (6 أرقام)" required minlength="6">
               <button type="submit" id="btn-signup" class="w-full py-4 bg-brand text-white font-bold rounded-xl">إنشاء حساب</button>
           </form>
       </div>

       <div id="profile-details-section" class="hidden bg-white p-6 rounded-2xl shadow-sm text-center">
           <div class="w-24 h-24 bg-brand/10 rounded-full flex items-center justify-center mx-auto text-4xl mb-4">👤</div>
           <h3 id="profile-view-name" class="font-black text-xl text-gray-800"></h3>
           <p id="profile-view-phone" class="text-gray-500 font-bold mt-1"></p>
           <p id="profile-view-gov" class="text-sm text-gray-400 font-bold mb-6"></p>
           <button onclick="handleLogout()" class="w-full py-3 border-2 border-red-50 text-red-500 font-bold rounded-xl hover:bg-red-50">تسجيل خروج</button>
       </div>
   </main>

   <nav class="fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around items-center py-2 pb-4 shadow-[0_-5px_15px_rgba(0,0,0,0.03)] z-40 max-w-lg left-1/2 -translate-x-1/2 rounded-t-2xl">
       <button onclick="switchNav('home')" id="nav-home" class="nav-btn flex flex-col items-center gap-1 text-brand w-16"><span class="text-2xl">🏠</span><span class="text-[10px] font-bold">الرئيسية</span></button>
       <button onclick="switchNav('wishlist')" id="nav-wishlist" class="nav-btn flex flex-col items-center gap-1 text-gray-400 w-16"><span class="text-2xl">❤️</span><span class="text-[10px] font-bold">المفضلة</span></button>
       <button onclick="switchNav('orders')" id="nav-orders" class="nav-btn flex flex-col items-center gap-1 text-gray-400 w-16"><span class="text-2xl">📦</span><span class="text-[10px] font-bold">طلباتي</span></button>
       <button onclick="switchNav('profile')" id="nav-profile" class="nav-btn flex flex-col items-center gap-1 text-gray-400 w-16"><span class="text-2xl">👤</span><span class="text-[10px] font-bold">حسابي</span></button>
   </nav>

   <div id="cart-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden backdrop-blur-sm transition-opacity" onclick="toggleCart()"></div>
   <div id="cart-drawer" class="fixed top-0 left-0 h-full w-full sm:w-[400px] bg-white z-[70] shadow-2xl flex flex-col cart-closed">
        <div class="p-4 border-b flex justify-between items-center bg-bgLight">
            <h2 class="font-black text-xl text-brand">سلة التسوق</h2>
            <button onclick="toggleCart()" class="text-gray-400 bg-white rounded-full p-1 shadow-sm">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white"></div>
        <div id="checkout-area" class="p-5 border-t bg-bgLight hidden shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
            <div class="bg-white p-3 rounded-xl border border-brand/20 mb-4 text-sm font-bold">
                <div class="flex justify-between mb-2 text-gray-500"><span>إجمالي المنتجات:</span><span id="cart-total-text">0 ج.م</span></div>
                <div class="flex justify-between mb-2 text-red-500 pb-2 border-b"><span>المقدم المطلوب (25%):</span><span id="cart-deposit-text">0 ج.م</span></div>
                <div class="flex justify-between text-brand text-lg"><span>الباقي عند الاستلام:</span><span id="cart-remainder-text">0 ج.م</span></div>
            </div>
            <div class="bg-orange-50 p-3 rounded-xl border border-orange-100 mb-4 text-xs font-bold text-orange-800 text-center leading-relaxed">
                ⚠️ لضمان الحجز وتجهيز العمل اليدوي، يرجى دفع المقدم بفودافون كاش.
            </div>
            <button id="checkout-btn" onclick="handleCheckout()" class="w-full py-4 bg-brand text-white font-bold text-lg rounded-xl flex justify-center items-center gap-2">تأكيد ودفع المقدم ➔</button>
        </div>
   </div>

   <script type="module" src="app.js"></script>
 </body>
</html>
