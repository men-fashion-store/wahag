<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم وَهَج</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#FAF8F5] font-[Cairo] min-h-screen p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-none border border-gray-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-black text-[#8B7355]">لوحة تحكم وَهَج ✨</h1>
                <p class="text-sm text-gray-500 mt-1">إدارة منتجات وطلبات الشموع</p>
            </div>
            <a href="index.html" target="_blank" class="px-6 py-2 border border-[#8B7355] text-[#8B7355] hover:bg-[#8B7355] hover:text-white transition">عرض الموقع</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 border border-gray-200">
                <h3 class="font-bold text-lg mb-6 border-b pb-2">إضافة شمعة جديدة</h3>
                <div class="space-y-4">
                    <input id="prod-name" class="w-full p-3 border outline-none focus:border-[#8B7355] bg-[#FAF8F5]" placeholder="اسم الشمعة (مثال: شمعة المحيط)">
                    <div class="flex gap-4">
                        <input id="prod-price" type="number" class="w-full p-3 border outline-none focus:border-[#8B7355] bg-[#FAF8F5]" placeholder="السعر">
                        <input id="prod-old-price" type="number" class="w-full p-3 border outline-none focus:border-[#8B7355] bg-[#FAF8F5]" placeholder="السعر قبل الخصم (اختياري)">
                    </div>
                    
                    <div class="border-2 border-dashed border-[#8B7355] p-6 text-center cursor-pointer hover:bg-[#FAF8F5] transition" onclick="document.getElementById('img-file').click()">
                        <input type="file" id="img-file" hidden onchange="window.handleImg(this)">
                        <span class="text-[#8B7355] font-bold">اضغط لرفع صورة الشمعة</span>
                    </div>
                    <div id="preview-area" class="h-24 w-24 mx-auto rounded overflow-hidden"></div>

                    <button onclick="window.uploadProduct()" id="upload-btn" class="w-full bg-[#8B7355] text-white py-3 font-bold tracking-widest mt-4">نشر المنتج</button>
                </div>
            </div>

            <div class="bg-white p-6 border border-gray-200">
                <h3 class="font-bold text-lg mb-6 border-b pb-2">أحدث الطلبات 📦</h3>
                <div id="orders-list" class="space-y-4 max-h-[500px] overflow-y-auto">
                    <p class="text-center text-gray-500">جاري التحميل...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyASO-AN5XaSGn4SaCZ8VlHr6zsFCIxPCzs", authDomain: "ahmed-shoes.firebaseapp.com", projectId: "ahmed-shoes", storageBucket: "ahmed-shoes.firebasestorage.app", messagingSenderId: "172928088473", appId: "1:172928088473:web:100f543fd097a8d5c33b08" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.tempImage = null;

        // جلب الطلبات
        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('orders-list');
            if(snap.empty) { list.innerHTML = '<p class="text-center text-gray-400">لا توجد طلبات بعد</p>'; return; }
            
            list.innerHTML = snap.docs.map(d => {
                const o = d.data();
                return `
                <div class="p-4 border border-gray-100 bg-[#FAF8F5]">
                    <div class="flex justify-between font-bold mb-2"><span>${o.customerName}</span><span class="text-[#8B7355]">${o.total} ج.م</span></div>
                    <p class="text-sm text-gray-600 mb-2">📞 ${o.customerPhone}<br>📍 ${o.customerAddress}</p>
                    <div class="text-xs bg-white p-2 border">${o.items.map(i=>`- ${i.name} x${i.qty}`).join('<br>')}</div>
                    <button onclick="window.delDoc('${d.id}')" class="mt-3 text-red-500 text-xs font-bold underline">حذف الطلب</button>
                </div>`;
            }).join('');
        });

        window.delDoc = async (id) => { if(confirm('حذف الطلب نهائياً؟')) await deleteDoc(doc(db, "orders", id)); };

        // رفع الصورة
        const compress = (f) => new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload=e=>{ const i=new Image(); i.src=e.target.result; i.onload=()=>{ const c=document.createElement('canvas'); const s=600/i.width; c.width=600; c.height=i.height*s; c.getContext('2d').drawImage(i,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',0.7)); } } });
        window.handleImg = async (inp) => { if(inp.files[0]) { window.tempImage = await compress(inp.files[0]); document.getElementById('preview-area').innerHTML = `<img src="${window.tempImage}" class="w-full h-full object-cover">`; } };

        // إضافة المنتج
        window.uploadProduct = async () => {
            const name = document.getElementById('prod-name').value, price = document.getElementById('prod-price').value, oldPrice = document.getElementById('prod-old-price').value, btn = document.getElementById('upload-btn');
            if(!name || !price || !window.tempImage) return alert('يرجى كتابة الاسم والسعر ورفع الصورة!');
            btn.disabled = true; btn.innerText = 'جاري الرفع...';
            try { 
                await addDoc(collection(db,"products"),{name, price:Number(price), oldPrice:oldPrice?Number(oldPrice):null, images:[window.tempImage], timestamp:Date.now()}); 
                alert('تمت الإضافة بنجاح ✨'); 
                location.reload(); 
            } catch(e) { alert('خطأ في الرفع'); btn.disabled=false; btn.innerText='نشر المنتج'; }
        };
    </script>
</body>
</html>
