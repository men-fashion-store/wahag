<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة متجر وَهَج</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Cairo', sans-serif; }
        .new-order-anim { animation: pulseBg 2s infinite; }
        @keyframes pulseBg { 0% { background-color: #fff; } 50% { background-color: #eef2ff; border-color: #8B7355; } 100% { background-color: #fff; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div class="max-w-6xl mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow-sm mb-8 flex justify-between items-center border border-gray-100">
            <div>
                <h1 class="text-3xl font-black text-[#8B7355]">لوحة القيادة | وَهَج 🕯️</h1>
                <p class="text-gray-500 font-bold mt-1">إدارة الطلبات والمنتجات الاحترافية</p>
            </div>
            <a href="index.html" target="_blank" class="px-6 py-3 bg-[#8B7355] text-white font-bold rounded-xl shadow-md hover:bg-[#6A563D] transition">زيارة المتجر 🌐</a>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 sticky top-8">
                    <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-800">➕ إضافة شمعة جديدة</h2>
                    <div class="space-y-4">
                        <input id="prod-name" class="w-full p-3 rounded-lg bg-gray-50 border outline-none focus:border-[#8B7355]" placeholder="اسم المنتج">
                        <div class="flex gap-2">
                            <input id="prod-price" type="number" class="w-full p-3 rounded-lg bg-gray-50 border outline-none focus:border-[#8B7355]" placeholder="السعر">
                            <input id="prod-old-price" type="number" class="w-full p-3 rounded-lg bg-red-50 border-red-200 outline-none focus:border-red-400 text-red-600" placeholder="سعر قديم">
                        </div>
                        <textarea id="prod-desc" class="w-full p-3 rounded-lg bg-gray-50 border outline-none focus:border-[#8B7355] h-20" placeholder="وصف الرائحة..."></textarea>
                        
                        <div class="border-2 border-dashed border-[#8B7355] bg-orange-50/30 p-6 rounded-xl text-center cursor-pointer hover:bg-orange-50 transition" onclick="document.getElementById('img-file').click()">
                            <input type="file" id="img-file" hidden onchange="window.handleImg(this)">
                            <span class="text-[#8B7355] font-bold text-sm">اضغط لاختيار صورة 📷</span>
                        </div>
                        <div id="preview-area" class="mt-2 rounded-xl overflow-hidden shadow-sm hidden"></div>

                        <button onclick="window.uploadProduct()" id="upload-btn" class="w-full bg-[#8B7355] text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-[#6A563D] transition mt-2">نشر المنتج 🚀</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6 border-b pb-2">
                        <h2 class="text-xl font-bold text-gray-800">📦 سجل الطلبات</h2>
                        <span id="order-count" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold border border-red-200">0 طلب</span>
                    </div>
                    <div id="orders-list" class="space-y-4">
                        <p class="text-center text-gray-400 py-10 font-bold animate-pulse">جاري الاستماع للطلبات الجديدة...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // تم تحديث بيانات فايربيز هنا أيضاً
        const firebaseConfig = {
          apiKey: "AIzaSyAnz5eg_i_nvrQr128ms_PlYldEFdIrIUY",
          authDomain: "wahaj-21a9d.firebaseapp.com",
          projectId: "wahaj-21a9d",
          storageBucket: "wahaj-21a9d.firebasestorage.app",
          messagingSenderId: "820263571886",
          appId: "1:820263571886:web:2af268a7acbdba7b75f83f",
          measurementId: "G-CXZZ0N8598"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        window.tempImage = null;
        let isFirstLoad = true;

        onSnapshot(query(collection(db, "orders"), orderBy("timestamp", "desc")), (snap) => {
            const list = document.getElementById('orders-list');
            document.getElementById('order-count').innerText = `${snap.size} طلب`;
            if(snap.empty) { list.innerHTML = '<div class="text-center text-gray-400 py-10 font-bold">لا توجد طلبات حتى الآن</div>'; return; }

            snap.docChanges().forEach((change) => {
                if (change.type === "added" && !isFirstLoad) {
                    const audio = document.getElementById('notification-sound');
                    audio.play().catch(e => console.log("Auto-play blocked"));
                }
            });
            isFirstLoad = false;

            list.innerHTML = snap.docs.map(d => {
                const o = d.data();
                const isNew = o.read === false; 
                const statusColors = { 'new': 'bg-yellow-100 text-yellow-700', 'processing': 'bg-blue-100 text-blue-700', 'completed': 'bg-green-100 text-green-700' };

                return `
                <div class="p-5 rounded-xl border ${isNew ? 'border-[#8B7355] new-order-anim shadow-md' : 'border-gray-200 bg-gray-50'} transition-all relative overflow-hidden">
                    ${isNew ? '<span class="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-3 rounded-bl-lg">طلب جديد !</span>' : ''}
                    <div class="flex justify-between items-start mb-3 mt-2">
                        <div>
                            <h3 class="font-bold text-lg text-gray-800">${o.customerName}</h3>
                            <p class="text-sm text-gray-500 font-bold mt-1">📞 ${o.customerPhone}</p>
                            <p class="text-sm text-gray-500 font-bold">📍 ${o.customerAddress}</p>
                        </div>
                        <div class="text-left">
                            <p class="font-black text-2xl text-[#8B7355]">${o.total} <span class="text-sm">ج.م</span></p>
                            <p class="text-xs text-gray-400 mt-1">${new Date(o.timestamp).toLocaleString('ar-EG')}</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg p-3 border border-gray-100 my-3">
                        <div class="space-y-1 text-sm font-bold text-gray-700">
                            ${o.items.map(i => `<div class="flex justify-between"><span>🔸 ${i.name}</span><span>x${i.qty}</span></div>`).join('')}
                        </div>
                    </div>
                    <div class="flex items-center gap-2 mt-4 pt-4 border-t border-gray-200">
                        <select onchange="window.updateOrderStatus('${d.id}', this.value)" class="p-2 border rounded-lg text-sm font-bold outline-none flex-1 ${statusColors[o.status||'new']}">
                            <option value="new" ${o.status==='new'?'selected':''}>⏳ قيد المراجعة</option>
                            <option value="processing" ${o.status==='processing'?'selected':''}>⚙️ جاري التجهيز</option>
                            <option value="completed" ${o.status==='completed'?'selected':''}>✅ تم التسليم</option>
                        </select>
                        <a href="https://wa.me/20${o.customerPhone}?text=مرحباً ${o.customerName}، نتواصل معك من متجر وَهَج بخصوص طلبك.." target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-green-600">واتساب</a>
                        <button onclick="window.delDoc('${d.id}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-lg font-bold text-sm hover:bg-red-100 border border-red-100">حذف</button>
                    </div>
                </div>`;
            }).join('');
        });

        window.updateOrderStatus = async (id, status) => { await updateDoc(doc(db, "orders", id), { status: status, read: true }); };
        window.delDoc = async (id) => { if(confirm('متأكد من حذف الطلب نهائياً؟')) await deleteDoc(doc(db, "orders", id)); };

        const compress = (f) => new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload=e=>{ const i=new Image(); i.src=e.target.result; i.onload=()=>{ const c=document.createElement('canvas'); const s=600/i.width; c.width=600; c.height=i.height*s; c.getContext('2d').drawImage(i,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',0.7)); } } });
        
        window.handleImg = async (inp) => { 
            if(inp.files[0]) { 
                const preview = document.getElementById('preview-area');
                preview.classList.remove('hidden');
                preview.innerHTML = '<p class="p-4 text-center text-sm font-bold">جاري الضبط...</p>';
                window.tempImage = await compress(inp.files[0]); 
                preview.innerHTML = `<img src="${window.tempImage}" class="w-full h-32 object-cover">`; 
            } 
        };

        window.uploadProduct = async () => {
            const name = document.getElementById('prod-name').value;
            const price = document.getElementById('prod-price').value;
            const oldPrice = document.getElementById('prod-old-price').value;
            const desc = document.getElementById('prod-desc').value;
            const btn = document.getElementById('upload-btn');

            if(!name || !price || !window.tempImage) return alert('يرجى كتابة الاسم والسعر واختيار صورة ⚠️');
            
            btn.disabled = true; 
            btn.innerHTML = 'جاري النشر... ⏳';
            
            try { 
                await addDoc(collection(db,"products"),{
                    name, desc, price: Number(price), oldPrice: oldPrice ? Number(oldPrice) : null, images: [window.tempImage], timestamp: Date.now()
                }); 
                alert('تم نشر الشمعة بنجاح ✨'); 
                location.reload(); 
            } catch(e) { alert('حدث خطأ في الرفع'); btn.disabled=false; btn.innerHTML='نشر المنتج 🚀'; }
        };

        document.body.addEventListener('click', () => {
            const audio = document.getElementById('notification-sound');
            if (audio.paused && !audio.src.includes('played')) {
                audio.play().then(()=>audio.pause()).catch(()=>{});
                audio.src += '#played';
            }
        }, { once: true });
    </script>
</body>
</html>
